org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

android.useAndroidX=true
android.nonTransitiveRClass=true

# AGP 8.5.0 was only validated up to compileSdk 34; we compile against 36 for
# Android 16 forward-compat. Suppress the (benign) untested-compileSdk warning.
# Remove this once AGP is upgraded to a version that officially supports SDK 36.
android.suppressUnsupportedCompileSdk=36

kotlin.code.style=official
